name: Auto-Registrar Predicciones

# Cron cada 15 minutos durante horarios de jornada (hora Madrid).
# Los horarios estan en UTC (Madrid = UTC+2 verano, UTC+1 invierno).
# Para cubrir ambos casos usamos ventanas amplias en UTC.
#
# Jornadas (hora Madrid):
#   Mar/Mié 10:00-16:00  -> UTC 08:00-15:00 (verano) o 09:00-15:00 (invierno)
#   Vie     14:00-19:00  -> UTC 12:00-18:00 (verano)
#   Vie     21:00-23:59  -> UTC 19:00-22:00 (verano)
#   Sab     00:00-03:00  -> UTC 22:00-02:00 (verano)
#   Sab     20:40-23:59  -> UTC 18:40-22:00 (verano)
#   Dom     00:00-03:00  -> UTC 22:00-02:00 (verano)
#
# Para no complicar, usamos un cron cada 15 min DURANTE EL DIA, y el
# script Python decide si toca registrar o no (filtro de dias + jornada).

on:
  schedule:
    # Cada 15 minutos de 06:00 a 23:59 UTC (cubre todas las ventanas
    # de jornada con margen).
    - cron: '*/15 6-23 * * *'
  # Tambien permitimos ejecucion manual desde la pestana Actions
  workflow_dispatch:

jobs:
  registrar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth google-auth-oauthlib

      - name: Ejecutar auto_registrar.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          cd ${{ github.workspace }}
          python auto_registrar.py
